<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şeş Beş Cafe</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
}

.header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#000,#111);
}

h1{
font-size:55px;
color:#FFD700;
margin-bottom:15px;
text-shadow:0 0 20px gold;
}

p{
color:#ccc;
font-size:18px;
}

.button{
margin-top:30px;
padding:18px 40px;
background:gold;
color:black;
font-size:22px;
font-weight:bold;
border-radius:50px;
text-decoration:none;
}

img{
width:100%;
display:block;
}
</style>

</head>

<body>

<div class="header">

<h1>Şeş Beş</h1>

<p>Premium Cafe & Lounge</p>

<a class="button" href="#menu">MENYUYA KEÇ</a>

</div>

<div id="menu">

<img src="menu1.jpg">

<img src="menu2.jpg">

<img src="menu3.jpg">

</div>

</html>
