<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şeş Beş Cafe</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #000;
    /* overflow: hidden; yığışdırıldı ki, menyu aşağı sürüşə bilsin */
    overflow-x: hidden; 
}

/* Loading Ekranı */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.logo {
    width: 220px;
    animation: glow 2s infinite alternate;
}

.title {
    color: #FFD700;
    font-size: 42px;
    margin-top: 20px;
    text-shadow: 0 0 20px gold;
}

.sub {
    color: #fff;
    margin-top: 10px;
    font-size: 18px;
}

.smoke {
    position: absolute;
    width: 250%;
    height: 250%;
    background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
    animation: smoke 12s linear infinite;
}

@keyframes smoke {
    0% { transform: translate(-20%, -20%) rotate(0deg); }
    100% { transform: translate(20%, 20%) rotate(360deg); }
}

@keyframes glow {
    from { filter: drop-shadow(0 0 5px gold); transform: scale(.95); }
    to { filter: drop-shadow(0 0 30px gold); transform: scale(1.05); }
}

/* Əsas Kontent */
#main {
    display: none;
    padding: 25px;
    text-align: center;
    color: white;
}

.notice {
    background: #2b0000;
    border: 1px solid gold;
    color: #FFD700;
    padding: 12px;
    border-radius: 12px;
    margin: 20px;
    animation: blink 2s infinite;
}

@keyframes blink {
    50% { box-shadow: 0 0 30px gold; }
}

.btn {
    display: block;
    margin: 18px auto;
    width: 90%;
    padding: 18px;
    background: linear-gradient(#FFD700, #c79b00);
    color: #000;
    text-decoration: none;
    font-size: 22px;
    font-weight: bold;
    border-radius: 15px;
    box-shadow: 0 0 20px gold;
    transition: 0.3s;
    cursor: pointer;
}

.btn:hover, .btn:active {
    transform: scale(1.05);
    box-shadow: 0 0 35px gold;
}

/* Qalereya və Menyu Şəkli */
.gallery {
    display: none;
    margin-top: 20px;
    overflow: hidden;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px gold;
    animation: fade .5s;
    transition: .4s;
    touch-action: pan-y;
}

@keyframes fade {
    from { opacity: 0; transform: scale(.95); }
    to { opacity: 1; transform: scale(1); }
}

/* Arxa fondakı qızılı parıltılar */
.spark {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #FFD700;
    border-radius: 50%;
    animation: float 8s linear infinite;
    opacity: .8;
    pointer-events: none;
}

.spark:nth-child(1){left:10%; animation-delay:0s;}
.spark:nth-child(2){left:30%; animation-delay:2s;}
.spark:nth-child(3){left:50%; animation-delay:4s;}
.spark:nth-child(4){left:70%; animation-delay:6s;}
.spark:nth-child(5){left:90%; animation-delay:8s;}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-100px); opacity: 0; }
}

/* Footer (Aşağı hissə) */
.footer {
    margin-top: 35px;
    color: #aaa;
    font-size: 14px;
}

.footer a {
    color: #FFD700;
    text-decoration: none;
    margin: 0 8px;
}
</style>
</head>

<body>

<!-- Qızılı Parıltılar -->
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>
<div class="spark"></div>

<!-- Loading Ekranı -->
<div id="loading">
    <div class="smoke"></div>
    <img class="logo" src="file_00000000791c720a91f8673fcbe4aef6.png" alt="Logo">
    <h1 class="title">Şeş Beş</h1>
    <p class="sub">Premium Cafe & Lounge</p>
</div>

<!-- Əsas Səhifə -->
<div id="main">
    <img class="logo" src="file_00000000791c720a91f8673fcbe4aef6.png" alt="Logo">
    
    <div class="notice">
        ⏰ 18:00-dan sonra sadə çay verilmir!
    </div>

    <!-- Aktiv düymələr (onclick funksiyası ilə) -->
    <a class="btn" onclick="showMainMenu()">🍽 ƏSAS MENYU</a>
    <a class="btn" onclick="showSets()">💨 QƏLYAN SETLƏRİ</a>

    <!-- Qalereya Bölməsi -->
    <div class="gallery" id="gallery">
        <img id="menuImage" src="file_0000000062dc71f4acdd5d99e0bcd385.png" alt="Menyu">
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Şeş Beş Cafe © 2026</p>
        <p>
            <a href="tel:+994XXXXXXXXX">📞 Zəng et</a> | 
            <a href="#">📷 Instagram</a>
        </p>
    </div>
</div>

<script>
// 3 saniyə sonra loading ekranını gizlət və əsas səhifəni aç
setTimeout(function(){
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000);

// Menyu göstərmə funksiyaları
function showMainMenu(){
    document.getElementById("gallery").style.display = "block";
    document.getElementById("menuImage").src = "file_0000000062dc71f4acdd5d99e0bcd385.png";
}

function showSets(){
    document.getElementById("gallery").style.display = "block";
    document.getElementById("menuImage").src = "file_00000000ca1471f4b26349f8a01c41f7.png";
}

// Telefondan sağa-sola sürüşdürmə (Swipe) funksiyası
let img = document.getElementById("menuImage");
let startX = 0;

img.addEventListener("touchstart", function(e){
    startX = e.touches[0].clientX;
});

img.addEventListener("touchend", function(e){
    let endX = e.changedTouches[0].clientX;
    
    if(startX - endX > 60){
        // Sola sürüşdürəndə Qəlyan menyusu
        img.src = "file_00000000ca1471f4b26349f8a01c41f7.png";
    }
    if(endX - startX > 60){
        // Sağa sürüşdürəndə Əsas menyu
        img.src = "file_0000000062dc71f4acdd5d99e0bcd385.png";
    }
});
</script>

</body>
</html>
