<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şeş Beş Cafe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
background-image:linear-gradient(#111,#000);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:450px;
text-align:center;
padding:20px;
}

.logo{
width:100%;
border-radius:20px;
box-shadow:0 0 30px gold;
margin-bottom:20px;
}

h1{
color:#FFD700;
font-size:36px;
margin-bottom:8px;
}

p{
color:#ddd;
margin-bottom:20px;
}

.notice{
background:#2b0000;
color:#FFD700;
padding:12px;
border:1px solid gold;
border-radius:12px;
margin-bottom:25px;
font-weight:bold;
}

.btn{
display:block;
margin:15px auto;
padding:18px;
background:linear-gradient(90deg,#FFD700,#d4af37);
color:#000;
text-decoration:none;
font-size:22px;
font-weight:bold;
border-radius:15px;
box-shadow:0 0 15px gold;
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
}
</style>

</head>

<body>

<div class="container">

<img class="logo" src="file_00000000791c720a91f8673fcbe4aef6.png">

<h1>Şeş Beş Cafe</h1>

<p>Xoş gəlmisiniz</p>

<div class="notice">
⏰ 18:00-dan sonra sadə çay verilmir!
</div>

<a class="btn"
href="file_0000000062dc71f4acdd5d99e0bcd385.png">
🍽 ƏSAS MENYU
</a>

<a class="btn"
href="file_00000000ca1471f4b26349f8a01c41f7.png">
💨 QƏLYAN SETLƏRİ
</a>

</div>

</body>
</html>
